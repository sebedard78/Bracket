<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loon Pond LIVE Scoreboard</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow-x: hidden; }
        
        .score-card { 
            background: linear-gradient(145deg, #111827, #000000); 
            border: 1px solid #1e293b; 
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* CORNER RIBBON */
        .ribbon-wrapper {
            width: 85px; height: 88px;
            overflow: hidden;
            position: absolute;
            top: -3px; right: -3px;
            z-index: 50;
        }
        .ribbon {
            font: bold 10px sans-serif;
            color: #fff; text-align: center;
            transform: rotate(45deg);
            position: relative;
            padding: 4px 0;
            top: 15px; left: -5px;
            width: 120px;
            background-color: #ef4444;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid white;
        }

        .pulse-live { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        /* FULLSCREEN LANDSCAPE */
        :fullscreen .score-card { width: 100vw; height: 100vh; border: none; border-radius: 0; display: flex; flex-direction: column; }
        :fullscreen .score-num { font-size: 35vh !important; }
        :fullscreen .ringer-val { font-size: 7vh !important; color: #38bdf8; }
        :fullscreen .ribbon { font-size: 24px; width: 300px; top: 40px; left: -20px; padding: 10px 0; }
        :fullscreen .ribbon-wrapper { width: 200px; height: 200px; }
        :fullscreen .close-fs { display: block !important; }
        :fullscreen .team-label { font-size: 4vh !important; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header id="header" class="max-w-6xl mx-auto flex justify-between items-center mb-6 border-b border-zinc-800 pb-4">
        <div>
            <h1 class="text-2xl font-black italic uppercase text-sky-400">Live Scores</h1>
            <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full pulse-live"></span> Loon Pond Horseshoe Club
            </p>
        </div>
        <div id="clock" class="text-right font-mono text-zinc-500 text-xs"></div>
    </header>

    <main id="liveGrid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1cxDYgc31rIB3MZnlxEt8rHNIFtnPDIA",
            authDomain: "lphc-stats.firebaseapp.com",
            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",
            appId: "1:689983014450:web:3490f5167e00574a985e2b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const getR = (pts) => pts >= 6 ? 2 : (pts >= 3 ? 1 : 0);
        const getFirst = (n) => {
            if(!n || n === '---' || n === 'BYE') return n || '---';
            return n.includes(',') ? n.split(',')[1].trim().split(' ')[0] : n.split(' ')[0];
        };

        let activeMatches = [];
        let emptySince = null;
        const CLEAR_DELAY_MS = 5 * 60 * 1000;

        window.toggleFS = (el) => {
            if (!document.fullscreenElement) {
                if (el.requestFullscreen) el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                screen.orientation?.lock('landscape').catch(()=>{});
            }
        };

        window.exitFS = (e) => {
            e.stopPropagation();
            if (document.exitFullscreen) document.exitFullscreen();
        };

        onSnapshot(doc(db, "league", "masterData"), (s) => updateMatchData('LEAGUE', s.data()?.activeMatches || []));
        onSnapshot(doc(db, "tournament_final_v1", "data"), (s) => updateMatchData('TOURNEY', s.data()?.tActiveMatches || []));

        function updateMatchData(type, matches) {
            activeMatches = activeMatches.filter(m => m.source !== type);
            matches.forEach(m => activeMatches.push({...m, source: type}));
            renderAll();
        }

        function renderAll() {
            const container = document.getElementById('liveGrid');
            
            if (activeMatches.length === 0) {
                if (!emptySince) emptySince = Date.now();
                if (Date.now() - emptySince > CLEAR_DELAY_MS) {
                    container.innerHTML = `<div class="col-span-full py-20 text-center opacity-30 italic">No games in progress.</div>`;
                    return;
                }
            } else {
                emptySince = null;
            }

            activeMatches.forEach(m => {
                const id = m.mid || m.t1Name?.replace(/\s/g, '');
                let sc1 = 0, sc2 = 0, r1 = 0, r2 = 0, r3 = 0, r4 = 0, infoTxt = "", fCount = 0, isFinal = false;

                if (m.source === 'LEAGUE') {
                    fCount = (m.currGameFrames?.length || 0) + 1;
                    sc1 = (m.currGameFrames || []).reduce((s,f)=>s+Number(f.p1||0)+Number(f.p2||0),0) + Number(m.currF.p1||0) + Number(m.currF.p2||0) + (m.h1||0) + (m.h2||0);
                    sc2 = (m.currGameFrames || []).reduce((s,f)=>s+Number(f.p3||0)+Number(f.p4||0),0) + Number(m.currF.p3||0) + Number(m.currF.p4||0) + (m.h3||0) + (m.h4||0);
                    r1 = (m.currGameFrames || []).reduce((s,f)=>s+getR(f.p1), 0) + getR(m.currF.p1);
                    r2 = (m.currGameFrames || []).reduce((s,f)=>s+getR(f.p2), 0) + getR(m.currF.p2);
                    r3 = (m.currGameFrames || []).reduce((s,f)=>s+getR(f.p3), 0) + getR(m.currF.p3);
                    r4 = (m.currGameFrames || []).reduce((s,f)=>s+getR(f.p4), 0) + getR(m.currF.p4);
                    infoTxt = `Game ${m.gameNum} • Frame ${fCount}`;
                    
                    // League Final: Game 3 and Frame 16+
                    isFinal = (m.gameNum >= 3 && fCount >= 16) || m.isComplete || emptySince !== null;
                } else {
                    fCount = (m.frames?.length || 0) + 1;
                    sc1 = (m.frames || []).reduce((s,f)=>s+Number(f.p1||0)+Number(f.p2||0),0) + Number(m.currF.p1||0) + Number(m.currF.p2||0) + (m.h1||0);
                    sc2 = (m.frames || []).reduce((s,f)=>s+Number(f.p3||0)+Number(f.p4||0),0) + Number(m.currF.p3||0) + Number(m.currF.p4||0) + (m.h2||0);
                    r1 = (m.frames || []).reduce((s,f)=>s+getR(f.p1), 0) + getR(m.currF.p1);
                    r2 = (m.frames || []).reduce((s,f)=>s+getR(f.p2), 0) + getR(m.currF.p2);
                    r3 = (m.frames || []).reduce((s,f)=>s+getR(f.p3), 0) + getR(m.currF.p3);
                    r4 = (m.frames || []).reduce((s,f)=>s+getR(f.p4), 0) + getR(m.currF.p4);
                    infoTxt = `Match ${m.mid} • Frame ${fCount}`;
                    
                    // Tournament Final: Triggers at Frame 15 or 16
                    isFinal = (fCount >= 15) || m.isComplete || emptySince !== null;
                }

                let card = document.getElementById(`card-${id}`);
                if (!card) {
                    container.insertAdjacentHTML('beforeend', createStaticHtml(id, m));
                    card = document.getElementById(`card-${id}`);
                }

                card.querySelector('.s1').innerText = sc1;
                card.querySelector('.s2').innerText = sc2;
                card.querySelector('.info-label').innerText = infoTxt;
                card.querySelector('.ribbon-wrapper').style.display = isFinal ? 'block' : 'none';
                
                const ringers = [r1, r2, r3, r4];
                card.querySelectorAll('.ringer-val').forEach((span, idx) => {
                    span.innerText = ringers[idx] + 'R';
                });
            });
        }

        function createStaticHtml(id, m) {
            const t1 = m.t1Name || m.t1?.name || "Team 1";
            const t2 = m.t2Name || m.t2?.name || "Team 2";
            const p1 = getFirst(m.p1 || m.p1n);
            const p2 = getFirst(m.p2 || m.p2n);
            const p3 = getFirst(m.p3 || m.p3n);
            const p4 = getFirst(m.p4 || m.p4n);

            return `
            <div id="card-${id}" class="score-card rounded-2xl shadow-xl" onclick="toggleFS(this)">
                <div class="ribbon-wrapper" style="display:none"><div class="ribbon">Final</div></div>
                <button onclick="exitFS(event)" class="close-fs hidden absolute top-4 right-4 z-[60] bg-white/20 px-4 py-2 rounded-full text-[10px] font-bold uppercase backdrop-blur-md">Close</button>
                
                <div class="bg-zinc-900/50 px-4 py-2 flex justify-between items-center border-b border-zinc-800">
                    <span class="text-[9px] font-black uppercase text-sky-500">${m.source}</span>
                    <span class="info-label text-[9px] font-bold text-zinc-500 uppercase"></span>
                </div>

                <div class="flex-grow flex items-center p-4 grid grid-cols-2 relative">
                    <div class="text-center">
                        <p class="team-label text-[10px] font-bold text-zinc-400 uppercase truncate mb-1">${t1}</p>
                        <p class="s1 score-num text-6xl font-black tracking-tighter">0</p>
                    </div>
                    <div class="text-center border-l border-zinc-800">
                        <p class="team-label text-[10px] font-bold text-zinc-400 uppercase truncate mb-1">${t2}</p>
                        <p class="s2 score-num text-6xl font-black tracking-tighter">0</p>
                    </div>
                </div>

                <div class="bg-black/40 p-3 grid grid-cols-2 gap-4 border-t border-zinc-800">
                    <div class="text-[11px] font-bold uppercase space-y-1">
                        <div class="flex justify-between"><span>${p1}</span> <span class="ringer-val text-sky-400">0R</span></div>
                        <div class="flex justify-between"><span>${p2}</span> <span class="ringer-val text-sky-400">0R</span></div>
                    </div>
                    <div class="text-[11px] font-bold uppercase space-y-1 border-l border-zinc-800 pl-4">
                        <div class="flex justify-between"><span>${p3}</span> <span class="ringer-val text-sky-400">0R</span></div>
                        <div class="flex justify-between"><span>${p4}</span> <span class="ringer-val text-sky-400">0R</span></div>
                    </div>
                </div>
            </div>`;
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            if (activeMatches.length === 0) renderAll();
        }, 1000);
    </script>
</body>
</html>
