<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loon Pond LIVE Scoreboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .score-card { background: linear-gradient(145deg, #111827, #000000); border: 1px solid #1e293b; }
        .pulse-live { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-8 border-b border-zinc-800 pb-6">
        <div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter text-sky-400">Live Scoreboard</h1>
            <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full pulse-live"></span> Loon Pond Horseshoe Club
            </p>
        </div>
        <div id="clock" class="text-right font-mono text-zinc-500 text-sm"></div>
    </header>

    <main id="liveGrid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Live Games Will Inject Here -->
        <div class="col-span-full py-20 text-center opacity-30 italic">
            Waiting for active games...
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1cxDYgc31rIB3MZnlxEt8rHNIFtnPDIA",
            authDomain: "lphc-stats.firebaseapp.com",
            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",
            appId: "1:689983014450:web:3490f5167e00574a985e2b",
            measurementId: "G-P9GD4936KW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Helper to identify ringers
        const getR = (pts) => pts >= 6 ? 2 : (pts >= 3 ? 1 : 0);
        const getFirst = (n) => {
            if(!n || n === '---') return '---';
            if(n.includes(',')) return n.split(',')[1].trim().split(' ')[0];
            return n.split(' ')[0];
        };

        let leagueMatches = [];
        let tourneyMatches = [];

        // Listen to League Data
        onSnapshot(doc(db, "league", "masterData"), (snap) => {
            if (snap.exists()) {
                leagueMatches = snap.data().activeMatches || [];
                renderAll();
            }
        });

        // Listen to Tournament Data
        onSnapshot(doc(db, "tournament_final_v1", "data"), (snap) => {
            if (snap.exists()) {
                tourneyMatches = snap.data().tActiveMatches || [];
                renderAll();
            }
        });

        function renderAll() {
            const container = document.getElementById('liveGrid');
            let html = "";

            if (leagueMatches.length === 0 && tourneyMatches.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center opacity-30 italic text-xl">No games currently in progress.</div>`;
                return;
            }

            // Render League Games
            leagueMatches.forEach(m => {
                const isSingles = m.mode === 'SINGLES';
                // Calculate Totals
                const sc1 = m.currGameFrames.reduce((s,f)=>s+Number(f.p1||0)+Number(f.p2||0),0) + Number(m.currF.p1||0) + Number(m.currF.p2||0);
                const sc2 = m.currGameFrames.reduce((s,f)=>s+Number(f.p3||0)+Number(f.p4||0),0) + Number(m.currF.p3||0) + Number(m.currF.p4||0);
                
                // Ringers
                const r1 = m.currGameFrames.reduce((s,f)=>s+getR(f.p1), 0) + getR(m.currF.p1);
                const r2 = m.currGameFrames.reduce((s,f)=>s+getR(f.p2), 0) + getR(m.currF.p2);
                const r3 = m.currGameFrames.reduce((s,f)=>s+getR(f.p3), 0) + getR(m.currF.p3);
                const r4 = m.currGameFrames.reduce((s,f)=>s+getR(f.p4), 0) + getR(m.currF.p4);

                html += createMatchCard("League Series", m.t1Name, m.t2Name, sc1 + m.h1 + m.h2, sc2 + m.h3 + m.h4, [
                    {n: m.p1, r: r1}, {n: m.p2, r: r2}, {n: m.p3, r: r3}, {n: m.p4, r: r4}
                ], `Game ${m.gameNum} • Frame ${m.currGameFrames.length + 1}`, isSingles);
            });

            // Render Tournament Games
            tourneyMatches.forEach(m => {
                const sc1 = m.frames.reduce((s,f)=>s+Number(f.p1||0)+Number(f.p2||0),0) + Number(m.currF.p1||0) + Number(m.currF.p2||0);
                const sc2 = m.frames.reduce((s,f)=>s+Number(f.p3||0)+Number(f.p4||0),0) + Number(m.currF.p3||0) + Number(m.currF.p4||0);

                const r1 = m.frames.reduce((s,f)=>s+getR(f.p1), 0) + getR(m.currF.p1);
                const r2 = m.frames.reduce((s,f)=>s+getR(f.p2), 0) + getR(m.currF.p2);
                const r3 = m.frames.reduce((s,f)=>s+getR(f.p3), 0) + getR(m.currF.p3);
                const r4 = m.frames.reduce((s,f)=>s+getR(f.p4), 0) + getR(m.currF.p4);

                html += createMatchCard("Tournament Bracket", m.t1.name, m.t2.name, sc1 + m.h1, sc2 + m.h2, [
                    {n: m.p1n, r: r1}, {n: m.p2n, r: r2}, {n: m.p3n, r: r3}, {n: m.p4n, r: r4}
                ], `Match ${m.mid} • Frame ${m.frames.length + 1}`, false);
            });

            container.innerHTML = html;
        }

        function createMatchCard(label, t1, t2, s1, s2, players, info, isSingles) {
            return `
            <div class="score-card rounded-3xl overflow-hidden shadow-2xl">
                <div class="bg-zinc-900/50 px-6 py-3 flex justify-between items-center border-b border-zinc-800">
                    <span class="text-[10px] font-black uppercase tracking-widest text-sky-500">${label}</span>
                    <span class="text-[10px] font-bold text-zinc-500 uppercase">${info}</span>
                </div>
                <div class="p-8 grid grid-cols-2 items-center relative">
                    <div class="text-center">
                        <p class="text-xs font-bold text-zinc-400 uppercase truncate mb-2">${t1}</p>
                        <p class="text-7xl font-black tracking-tighter">${s1}</p>
                    </div>
                    <div class="text-center border-l border-zinc-800">
                        <p class="text-xs font-bold text-zinc-400 uppercase truncate mb-2">${t2}</p>
                        <p class="text-7xl font-black tracking-tighter">${s2}</p>
                    </div>
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-sky-500 text-black text-[10px] font-black px-2 py-1 rounded">VS</div>
                </div>
                <div class="bg-black/40 p-4 grid grid-cols-2 gap-4 border-t border-zinc-800">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[10px] font-bold uppercase"><span class="text-zinc-500">${getFirst(players[0].n)}</span> <span>${players[0].r}R</span></div>
                        ${!isSingles ? `<div class="flex justify-between text-[10px] font-bold uppercase"><span class="text-zinc-500">${getFirst(players[1].n)}</span> <span>${players[1].r}R</span></div>` : ''}
                    </div>
                    <div class="space-y-1 border-l border-zinc-800 pl-4">
                        <div class="flex justify-between text-[10px] font-bold uppercase"><span class="text-zinc-500">${getFirst(players[2].n)}</span> <span>${players[2].r}R</span></div>
                        ${!isSingles ? `<div class="flex justify-between text-[10px] font-bold uppercase"><span class="text-zinc-500">${getFirst(players[3].n)}</span> <span>${players[3].r}R</span></div>` : ''}
                    </div>
                </div>
            </div>`;
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
