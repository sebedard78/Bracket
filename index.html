<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LPHC Tournament Cloud</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loon Pond LIVE Scoreboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Condensed:wght@400;700&display=swap');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; padding: 0; }
        .tab-active { border-bottom: 5px solid #0ea5e9; color: #0ea5e9; font-weight: 900; }

        /* JUMBO SCORER BUTTONS */
        .btn-score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; background: #000; }
        .btn-score { background: #1e293b; border-radius: 16px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 5px solid #0f172a; }
        .btn-score .num { font-size: 3.2rem; font-weight: 900; line-height: 1; }
        .btn-score .sym { font-size: 0.8rem; color: #38bdf8; font-weight: 900; margin-top: 4px; }

        /* 15-COLUMN STICKY MICRO-TABLE */
        .micro-container { width: 100vw; background: #000; overflow-x: auto; border-top: 1px solid #1e293b; }
        .micro-table { width: 950px; table-layout: fixed; border-collapse: collapse; font-family: 'Roboto Condensed', sans-serif; }
        .micro-table th { font-size: 0.45rem; padding: 6px 0; color: #7dd3fc; background: #0f172a; border: 0.1px solid #1e293b; text-transform: uppercase; }
        .micro-table td { font-size: 0.9rem; padding: 22px 0; text-align: center; border: 0.1px solid #0f172a; color: #fff; line-height: 1; }

        .c-sh { width: 35px !important; font-weight: 900; color: #0ea5e9 !important; border-right: 1.5px solid #0ea5e9 !important; background: #000; position: sticky; left: 0; z-index: 10; }
        .c-r { width: 38px; color: #38bdf8; font-weight: bold; } 
        .c-p { width: 35px; font-weight: bold; color: #facc15; } 
        .c-t { width: 65px; background: #0c4a6e; font-weight: 900; }
        .c-t2 { width: 65px; background: #1e293b; font-weight: 900; color: #0ea5e9 !important; }
        .edit-cell { color: #fcd34d !important; text-decoration: underline; font-weight: 900; }

        /* TURN HIGHLIGHTING */
        .active-team-card { background-color: #0ea5e9 !important; color: #000 !important; }
        .active-team-card p { color: #000 !important; opacity: 1 !important; font-weight: 900; }
        .active-team-card .score-val { color: #000 !important; }

        /* BRACKET */
        .bracket-scroll { display: flex; gap: 25px; padding: 20px; overflow-x: auto; align-items: flex-start; min-height: 85vh; }
        .round-col { display: flex; flex-direction: column; gap: 20px; min-width: 180px; }
        .round-title { font-size: 9px; font-weight: 900; color: #64748b; text-transform: uppercase; text-align: center; border-bottom: 1px solid #1e293b; margin-bottom: 8px; }
        .match-card { background: #111827; border: 1.5px solid #1e293b; border-radius: 12px; overflow: hidden; }
        .team-line { display: flex; justify-content: space-between; padding: 12px; font-size: 11px; font-weight: 800; border-bottom: 1px solid #020617; }
        .team-line.win { background: #083344; color: #22d3ee; }
        .score-box { background: #000; color: #fff; padding: 4px 8px; border-radius: 6px; min-width: 30px; text-align: center; }

        /* UI SETUP */
        select { background: #1e293b; border: 2px solid #334155; padding: 18px; border-radius: 12px; width: 100%; color: white; font-weight: 900; font-size: 18px; margin-top: 6px; }
        .rot-btn { flex: 1; background: #1e293b; padding: 20px; border-radius: 12px; font-weight: 900; border: 2px solid transparent; }
        .rot-active { background: #0ea5e9; color: black; }

        #modal { display: none; position: fixed; inset: 0; background: #020617; z-index: 1000; overflow-y: auto; }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .score-card { background: linear-gradient(145deg, #111827, #000000); border: 1px solid #1e293b; }
        .pulse-live { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>

    <header class="bg-black p-4 flex justify-between items-center border-b-4 border-sky-500">
        <h1 class="text-xl font-black italic uppercase text-sky-400 tracking-tighter">Loon Pond Tournament</h1>
<body class="min-h-screen p-4 md:p-8">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-8 border-b border-zinc-800 pb-6">
        <div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter text-sky-400">Live Scoreboard</h1>
            <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full pulse-live"></span> Loon Pond Horseshoe Club
            </p>
        </div>
        <div id="clock" class="text-right font-mono text-zinc-500 text-sm"></div>
    </header>

    <nav class="flex bg-zinc-950 border-b border-zinc-900 sticky top-0 z-50">
        <button onclick="setView('BRACKET')" id="tabBRACKET" class="flex-1 py-6 text-[11px] font-black uppercase tracking-widest tab-active">Bracket</button>
        <button onclick="setView('ROSTER')" id="tabROSTER" class="flex-1 py-6 text-[11px] font-black uppercase tracking-widest text-zinc-500">Roster</button>
        <button onclick="setView('MANAGE')" id="tabMANAGE" class="flex-1 py-6 text-[11px] font-black uppercase tracking-widest text-zinc-500">Manage</button>
    </nav>

    <main id="app" class="p-2"></main>
    <div id="modal"></div>
    <main id="liveGrid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Live Games Will Inject Here -->
        <div class="col-span-full py-20 text-center opacity-30 italic">
            Waiting for active games...
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1cxDYgc31rIB3MZnlxEt8rHNIFtnPDIA",
            authDomain: "lphc-stats.firebaseapp.com",
            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",
            appId: "1:689983014450:web:3490f5167e00574a985e2b"
            appId: "1:689983014450:web:3490f5167e00574a985e2b",
            measurementId: "G-P9GD4936KW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "tournament_final_v1", "data");

        let state = { roster: [], bracket: null, bracketHistory: {} };
        let view = 'BRACKET';
        let scoring = { active: false, mid: null, t1: null, t2: null, p1n:'', p2n:'', p3n:'', p4n:'', h1:0, h2:0, rotation: 'T1_FIRST', frames: [], currF: {p1:null, p2:null, p3:null, p4:null}, pitcherIdx: 0 };

        onSnapshot(docRef, (snap) => { if (snap.exists()) { state = snap.data(); render(); } else { save(); } });
        async function save() { await setDoc(docRef, state); }

        // --- GLOBAL WIPE FUNCTION (FIXED) ---
        window.wipeTournament = async () => {
            if(!confirm("ERASE ALL DATA? This cannot be undone.")) return;
            const emptyState = { roster: [], bracket: null, bracketHistory: {} };
            await setDoc(docRef, emptyState);
            location.reload(); // Force refresh to clear all local app memory
        // Helper to identify ringers
        const getR = (pts) => pts >= 6 ? 2 : (pts >= 3 ? 1 : 0);
        const getFirst = (n) => {
            if(!n || n === '---') return '---';
            if(n.includes(',')) return n.split(',')[1].trim().split(' ')[0];
            return n.split(' ')[0];
        };

        const getSym = (p) => (p === null ? '-' : (p <= 2 ? '--' : (p === 3 ? 'O' : (p === 4 ? "O'" : 'OO'))));
        const getR = (p) => (p >= 6 ? 2 : (p >= 3 ? 1 : 0));
        let leagueMatches = [];
        let tourneyMatches = [];

        // --- ROSTER ---
        window.importRoster = () => {
            const raw = document.getElementById('rosIn').value;
            if(!raw.trim()) return;
            const teams = {};
            raw.split('\n').filter(l => l.trim()).forEach(line => {
                const cols = line.split(/\t|\|/).map(c => c.trim());
                if(cols.length < 3) return;
                const teamID = cols[0];
                const first = (cols[1].includes(',') ? cols[1].split(',')[1] : cols[1]).trim().toUpperCase();
                const hcp = parseInt(cols[2]) || 0;
                if(!teams[teamID]) teams[teamID] = { members: [] };
                teams[teamID].members.push({ name: first, hcp: hcp });
            });
            state.roster = Object.keys(teams).map(id => ({ id, name: teams[id].members.map(m => m.name).join('/'), members: teams[id].members }));
            save(); alert("Teams Sync'd");
        };

        window.delTeam = (idx) => { if(confirm("Delete?")) { state.roster.splice(idx,1); save(); } };

        // --- BRACKET ENGINE ---
        window.initBracket = () => {
            if(state.roster.length < 2) return alert("Add teams first");
            const teams = [...state.roster];
            const size = Math.pow(2, Math.ceil(Math.log2(teams.length)));
            while(teams.length < size) teams.push({ name: 'BYE', isBye: true, members: [{name:'BYE', hcp:0}, {name:'BYE', hcp:0}] });
            
            const getSeedOrder = (n) => {
                let order = [0, 1];
                for (let i = 2; i < n; i <<= 1) {
                    let nextOrder = [];
                    for (let j = 0; j < order.length; j++) {
                        nextOrder.push(order[j]);
                        nextOrder.push(i * 2 - 1 - order[j]);
                    }
                    order = nextOrder;
                }
                return order;
            };
            const seeded = getSeedOrder(size).map(idx => teams[idx]);

            state.bracket = { winners: [], losers: [] };
            for (let i = 0; i < seeded.length; i += 2) {
                state.bracket.winners.push({ id: 'W1-M'+(i/2+1), t1: seeded[i], t2: seeded[i+1], win: null, s1: 0, s2: 0 });
            }
            for (let r = 2; r <= Math.log2(size); r++) {
                let count = size / Math.pow(2, r);
                for (let m = 1; m <= count; m++) state.bracket.winners.push({ id: `W${r}-M${m}`, t1: null, t2: null, win: null, s1: 0, s2: 0 });
        // Listen to League Data
        onSnapshot(doc(db, "league", "masterData"), (snap) => {
            if (snap.exists()) {
                leagueMatches = snap.data().activeMatches || [];
                renderAll();
            }
            for (let m = 1; m <= size/2; m++) state.bracket.losers.push({ id: `L1-M${m}`, t1: null, t2: null, win: null, s1: 0, s2: 0 });
        });

            // AUTO-ADVANCE BYES
            state.bracket.winners.filter(m => m.id.startsWith('W1')).forEach(m => {
                if (m.t2?.isBye) { m.win = m.t1.name; m.s1 = 'BYE'; advance(m.id, m.t1, null); }
                else if (m.t1?.isBye) { m.win = m.t2.name; m.s2 = 'BYE'; advance(m.id, m.t2, null); }
            });
            save();
        };

        // --- MATCH SETUP (Triples) ---
        window.openMatch = (id) => {
            const m = [...state.bracket.winners, ...state.bracket.losers].find(x => x.id === id);
            if(!m || !m.t1 || !m.t2 || m.t1.isBye || m.t2.isBye) return;
            if(m.win) { showSummary(id); return; }

            const mod = document.getElementById('modal');
            mod.style.display = 'block';
            const ops = (team) => team.members.map(mem => `<option value="${mem.name}" data-hcp="${mem.hcp}">${mem.name} (${mem.hcp})</option>`).join('');

            mod.innerHTML = `
                <div class="p-8">
                    <h2 class="text-2xl font-black text-sky-400 uppercase italic mb-8">Lineup: ${id}</h2>
                    <div class="space-y-8">
                        <div class="p-6 bg-zinc-900 rounded-2xl border-2 border-zinc-800">
                            <p class="text-[12px] font-black uppercase text-zinc-400 mb-4">${m.t1.name}</p>
                            <select id="selP1">${ops(m.t1)}</select>
                            <select id="selP2">${ops(m.t1)}</select>
                        </div>
                        <div class="p-6 bg-zinc-900 rounded-2xl border-2 border-zinc-800">
                            <p class="text-[12px] font-black uppercase text-zinc-400 mb-4">${m.t2.name}</p>
                            <select id="selP3">${ops(m.t2)}</select>
                            <select id="selP4">${ops(m.t2)}</select>
                        </div>
                        <div class="flex gap-4">
                            <button id="rotT1" onclick="window.selRot='T1_FIRST'; this.classList.add('rot-active'); document.getElementById('rotT2').classList.remove('rot-active');" class="rot-btn rot-active">${m.t1.id || 'T1'} Starts</button>
                            <button id="rotT2" onclick="window.selRot='T2_FIRST'; this.classList.add('rot-active'); document.getElementById('rotT1').classList.remove('rot-active');" class="rot-btn">Opponent Starts</button>
                        </div>
                    </div>
                    <button onclick="startScoring('${id}')" class="w-full bg-sky-500 text-black p-6 mt-10 rounded-2xl font-black uppercase text-lg">Start Match</button>
                    <button onclick="document.getElementById('modal').style.display='none'" class="w-full p-6 mt-2 text-zinc-500 font-bold uppercase text-xs">Back</button>
                </div>`;
            window.selRot = 'T1_FIRST';
            if(m.t1.members.length > 1) document.getElementById('selP2').selectedIndex = 1;
            if(m.t2.members.length > 1) document.getElementById('selP4').selectedIndex = 1;
        };

        window.startScoring = (id) => {
            const m = [...state.bracket.winners, ...state.bracket.losers].find(x => x.id === id);
            const getD = (id) => { const el = document.getElementById(id); return { n: el.value, h: parseInt(el.options[el.selectedIndex].dataset.hcp) }; };
            const p1 = getD('selP1'), p2 = getD('selP2'), p3 = getD('selP3'), p4 = getD('selP4');
            scoring = { active: true, mid: id, t1: m.t1, t2: m.t2, p1n: p1.n, p2n: p2.n, p3n: p3.n, p4n: p4.n, h1: p1.h+p2.h, h2: p3.h+p4.h, rotation: window.selRot, frames: [], currF: {p1:null, p2:null, p3:null, p4:null}, pitcherIdx: 0 };
            renderScorer();
        };

        // --- SCORER ---
        window.addScore = (pts) => {
            const fNum = scoring.frames.length + 1;
            let turn = (scoring.rotation === 'T1_FIRST') ? (fNum % 2 !== 0 ? ['p1', 'p3', 'p2', 'p4'] : ['p3', 'p1', 'p4', 'p2']) : (fNum % 2 !== 0 ? ['p3', 'p1', 'p4', 'p2'] : ['p1', 'p3', 'p2', 'p4']);
            scoring.currF[turn[scoring.pitcherIdx]] = pts;
            scoring.pitcherIdx++;
            if(scoring.pitcherIdx > 3) {
                scoring.frames.push({ ...scoring.currF, sh: fNum * 2 });
                scoring.currF = {p1:null, p2:null, p3:null, p4:null}; scoring.pitcherIdx = 0;
                const t1s = scoring.frames.reduce((a,b)=>a+(b.p1||0)+(b.p2||0),0) + scoring.h1;
                const t2s = scoring.frames.reduce((a,b)=>a+(b.p3||0)+(b.p4||0),0) + scoring.h2;
                if(scoring.frames.length >= 15 && t1s !== t2s) finalizeMatch();
        // Listen to Tournament Data
        onSnapshot(doc(db, "tournament_final_v1", "data"), (snap) => {
            if (snap.exists()) {
                tourneyMatches = snap.data().tActiveMatches || [];
                renderAll();
            }
            renderScorer();
        };
        });

        window.editCell = (idx, p) => {
            const v = prompt("Correct points (0,1,2,3,4,6):", scoring.frames[idx][p]);
            if([0,1,2,3,4,6].includes(parseInt(v))) { scoring.frames[idx][p] = parseInt(v); renderScorer(); }
        };
        function renderAll() {
            const container = document.getElementById('liveGrid');
            let html = "";

        function finalizeMatch() {
            const f = scoring.frames;
            const s1 = f.reduce((a,b)=>a+(b.p1||0)+(b.p2||0),0) + scoring.h1;
            const s2 = f.reduce((a,b)=>a+(b.p3||0)+(b.p4||0),0) + scoring.h2;
            const m = [...state.bracket.winners, ...state.bracket.losers].find(x => x.id === scoring.mid);
            const winT = s1 > s2 ? scoring.t1 : scoring.t2;
            const loseT = s1 > s2 ? scoring.t2 : scoring.t1;
            m.win = winT.name; m.s1 = s1; m.s2 = s2;
            state.bracketHistory[scoring.mid] = { ...scoring, s1, s2 };
            advance(scoring.mid, winT, loseT);
            document.getElementById('modal').style.display = 'none';
            save();
        }

        function advance(mid, winner, loser) {
            const b = state.bracket;
            const r = parseInt(mid.split('-')[0].substring(1));
            const mIdx = parseInt(mid.split('-')[1].substring(1));
            if(mid.startsWith('W')){
                const nW = b.winners.find(x => x.id === `W${r+1}-M${Math.ceil(mIdx/2)}`);
                if(nW) { if(mIdx % 2 !== 0) nW.t1 = winner; else nW.t2 = winner; }
                const nL = b.losers.find(x => x.id === `L1-M${mIdx}`);
                if(nL && loser && !loser.isBye) { nL.t1 = loser; }
            } else {
                const nL = b.losers.find(x => x.id === `L${r+1}-M${Math.ceil(mIdx/2)}`);
                if(nL) { if(mIdx % 2 !== 0) nL.t1 = winner; else nL.t2 = winner; }
            if (leagueMatches.length === 0 && tourneyMatches.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center opacity-30 italic text-xl">No games currently in progress.</div>`;
                return;
            }
        }

        window.setView = (v) => { view = v; render(); };
            // Render League Games
            leagueMatches.forEach(m => {
                const isSingles = m.mode === 'SINGLES';
                // Calculate Totals
                const sc1 = m.currGameFrames.reduce((s,f)=>s+Number(f.p1||0)+Number(f.p2||0),0) + Number(m.currF.p1||0) + Number(m.currF.p2||0);
                const sc2 = m.currGameFrames.reduce((s,f)=>s+Number(f.p3||0)+Number(f.p4||0),0) + Number(m.currF.p3||0) + Number(m.currF.p4||0);
                
                // Ringers
                const r1 = m.currGameFrames.reduce((s,f)=>s+getR(f.p1), 0) + getR(m.currF.p1);
                const r2 = m.currGameFrames.reduce((s,f)=>s+getR(f.p2), 0) + getR(m.currF.p2);
                const r3 = m.currGameFrames.reduce((s,f)=>s+getR(f.p3), 0) + getR(m.currF.p3);
                const r4 = m.currGameFrames.reduce((s,f)=>s+getR(f.p4), 0) + getR(m.currF.p4);

                html += createMatchCard("League Series", m.t1Name, m.t2Name, sc1 + m.h1 + m.h2, sc2 + m.h3 + m.h4, [
                    {n: m.p1, r: r1}, {n: m.p2, r: r2}, {n: m.p3, r: r3}, {n: m.p4, r: r4}
                ], `Game ${m.gameNum} • Frame ${m.currGameFrames.length + 1}`, isSingles);
            });

        function render() {
            ['BRACKET', 'ROSTER', 'MANAGE'].forEach(t => { document.getElementById('tab'+t).className = `flex-1 py-6 text-[11px] font-black uppercase tracking-widest ${view===t?'tab-active':'text-zinc-600'}`; });
            const app = document.getElementById('app');
            if (view === 'ROSTER') {
                app.innerHTML = `<div class="p-4"><textarea id="rosIn" class="w-full h-40 bg-zinc-900 border-2 border-zinc-800 p-4 text-xs text-white rounded-2xl" placeholder="TeamID | Last, First | HCP"></textarea><button onclick="importRoster()" class="w-full bg-sky-500 text-black p-5 mt-4 font-black uppercase text-sm rounded-2xl">Sync Roster</button><div class="mt-8 space-y-2">${state.roster.map((t,i)=>`<div class="p-4 bg-zinc-900 rounded-xl flex justify-between items-center border border-zinc-800"><b>${t.name}</b><button onclick="delTeam(${i})" class="text-red-500 font-black uppercase text-[12px]">Del</button></div>`).join('')}</div></div>`;
            } else if (view === 'BRACKET') {
                if(!state.bracket) app.innerHTML = `<div class="mt-20 text-center"><button onclick="initBracket()" class="bg-sky-500 text-black px-12 py-5 rounded-2xl font-black text-sm uppercase">Initialize Bracket</button></div>`;
                else app.innerHTML = `<div class="bracket-scroll"><div class="round-col"><div class="round-title">Winners R1</div>${state.bracket.winners.filter(x=>x.id.startsWith('W1')).map(m=>renderCard(m)).join('')}</div><div class="round-col"><div class="round-title">Winners R2</div>${state.bracket.winners.filter(x=>x.id.startsWith('W2')).map(m=>renderCard(m)).join('')}</div><div class="round-col"><div class="round-title">Losers R1</div>${state.bracket.losers.map(m=>renderCard(m)).join('')}</div></div>`;
            } else if (view === 'MANAGE') { app.innerHTML = `<div class="p-10"><button onclick="wipeTournament()" class="w-full bg-red-600 p-8 rounded-2xl font-black uppercase text-lg shadow-2xl">Wipe All Data</button></div>`; }
        }
            // Render Tournament Games
            tourneyMatches.forEach(m => {
                const sc1 = m.frames.reduce((s,f)=>s+Number(f.p1||0)+Number(f.p2||0),0) + Number(m.currF.p1||0) + Number(m.currF.p2||0);
                const sc2 = m.frames.reduce((s,f)=>s+Number(f.p3||0)+Number(f.p4||0),0) + Number(m.currF.p3||0) + Number(m.currF.p4||0);

        function renderCard(m) { return `<div class="match-card" onclick="openMatch('${m.id}')"><div class="team-line ${m.win===m.t1?.name?'win':(m.win?'loss':'')}"><span>${m.t1?.name||'?'}</span><span class="score-box">${m.s1}</span></div><div class="team-line ${m.win===m.t2?.name?'win':(m.win?'loss':'')}"><span>${m.t2?.name||'?'}</span><span class="score-box">${m.s2}</span></div></div>`; }
                const r1 = m.frames.reduce((s,f)=>s+getR(f.p1), 0) + getR(m.currF.p1);
                const r2 = m.frames.reduce((s,f)=>s+getR(f.p2), 0) + getR(m.currF.p2);
                const r3 = m.frames.reduce((s,f)=>s+getR(f.p3), 0) + getR(m.currF.p3);
                const r4 = m.frames.reduce((s,f)=>s+getR(f.p4), 0) + getR(m.currF.p4);

        function renderScorer() {
            const mod = document.getElementById('modal'); mod.style.display = 'block';
            const fNum = scoring.frames.length + 1;
            let turn = (scoring.rotation === 'T1_FIRST') ? (fNum % 2 !== 0 ? ['p1', 'p3', 'p2', 'p4'] : ['p3', 'p1', 'p4', 'p2']) : (fNum % 2 !== 0 ? ['p3', 'p1', 'p4', 'p2'] : ['p1', 'p3', 'p2', 'p4']);
            const upKey = turn[scoring.pitcherIdx];
            const isT1Turn = ['p1','p2'].includes(upKey);
                html += createMatchCard("Tournament Bracket", m.t1.name, m.t2.name, sc1 + m.h1, sc2 + m.h2, [
                    {n: m.p1n, r: r1}, {n: m.p2n, r: r2}, {n: m.p3n, r: r3}, {n: m.p4n, r: r4}
                ], `Match ${m.mid} • Frame ${m.frames.length + 1}`, false);
            });

            const t1s = scoring.frames.reduce((a,b)=>a+(b.p1||0)+(b.p2||0),0) + scoring.h1;
            const t2s = scoring.frames.reduce((a,b)=>a+(b.p3||0)+(b.p4||0),0) + scoring.h2;
            container.innerHTML = html;
        }

            mod.innerHTML = `
                <div class="bg-black p-3 flex justify-between items-center border-b border-zinc-800 sticky top-0 z-[100]"><button onclick="document.getElementById('modal').style.display='none'" class="text-[10px] font-black uppercase text-zinc-500">Back</button><span class="text-sky-400 font-black text-xs uppercase">Frame ${fNum} ${fNum>15?'(Tie-Break)':''}</span><div class="w-8"></div></div>
                
                <div class="grid grid-cols-2 bg-zinc-900 border-b border-zinc-800">
                    <div class="p-12 text-center transition-colors duration-300 ${isT1Turn ? 'active-team-card' : ''}">
                        <p class="text-[8px] font-black opacity-30 truncate uppercase">${scoring.t1.name}</p>
                        <p class="text-6xl font-black score-val">${t1s}</p>
        function createMatchCard(label, t1, t2, s1, s2, players, info, isSingles) {
            return `
            <div class="score-card rounded-3xl overflow-hidden shadow-2xl">
                <div class="bg-zinc-900/50 px-6 py-3 flex justify-between items-center border-b border-zinc-800">
                    <span class="text-[10px] font-black uppercase tracking-widest text-sky-500">${label}</span>
                    <span class="text-[10px] font-bold text-zinc-500 uppercase">${info}</span>
                </div>
                <div class="p-8 grid grid-cols-2 items-center relative">
                    <div class="text-center">
                        <p class="text-xs font-bold text-zinc-400 uppercase truncate mb-2">${t1}</p>
                        <p class="text-7xl font-black tracking-tighter">${s1}</p>
                    </div>
                    <div class="p-12 text-center transition-colors duration-300 ${!isT1Turn ? 'active-team-card' : ''}">
                        <p class="text-[8px] font-black opacity-30 truncate uppercase">${scoring.t2.name}</p>
                        <p class="text-6xl font-black score-val ${!isT1Turn ? '' : 'text-red-500'}">${t2s}</p>
                    <div class="text-center border-l border-zinc-800">
                        <p class="text-xs font-bold text-zinc-400 uppercase truncate mb-2">${t2}</p>
                        <p class="text-7xl font-black tracking-tighter">${s2}</p>
                    </div>
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-sky-500 text-black text-[10px] font-black px-2 py-1 rounded">VS</div>
                </div>

                <div class="bg-sky-500 text-black text-center p-4 font-black uppercase text-[14px] italic">UP: ${upKey==='p1'?scoring.p1n : upKey==='p2'?scoring.p2n : upKey==='p3'?scoring.p3n : scoring.p4n}</div>
                <div class="btn-score-grid">${[0,1,2,3,4,6].map(s=>`<button onclick="addScore(${s})" class="btn-score"><span class="num">${s}</span><span class="sym">${getSym(s)}</span></button>`).join('')}</div>
                
                <div class="micro-container"><table class="micro-table">
                    <thead><tr><th class="c-sh">SH</th><th>R</th><th>P</th><th>S</th><th>R</th><th>P</th><th>S</th><th class="c-t">T1</th><th>R</th><th>P</th><th>S</th><th>R</th><th>P</th><th>S</th><th class="c-t2">T2</th></tr></thead>
                    <tbody>
                    <tr class="bg-zinc-950"><td class="c-sh">${fNum*2}</td><td class="c-r">${getSym(scoring.currF.p1)}</td><td>${scoring.currF.p1??''}</td><td></td><td class="c-r">${getSym(scoring.currF.p2)}</td><td>${scoring.currF.p2??''}</td><td></td><td></td><td class="c-r">${getSym(scoring.currF.p3)}</td><td>${scoring.currF.p3??''}</td><td></td><td class="c-r">${getSym(scoring.currF.p4)}</td><td>${scoring.currF.p4??''}</td><td></td><td></td></tr>
                    ${scoring.frames.map((f,i)=>{
                        const sl = scoring.frames.slice(0,i+1);
                        const s1=sl.reduce((a,b)=>a+(b.p1||0),0); const s2=sl.reduce((a,b)=>a+(b.p2||0),0);
                        const s3=sl.reduce((a,b)=>a+(b.p3||0),0); const s4=sl.reduce((a,b)=>a+(b.p4||0),0);
                        return `<tr><td class="c-sh">${f.sh}</td><td class="c-r">${getSym(f.p1)}</td><td class="edit-cell" onclick="editCell(${i},'p1')">${f.p1}</td><td class="c-s">${s1}</td><td class="c-r">${getSym(f.p2)}</td><td class="edit-cell" onclick="editCell(${i},'p2')">${f.p2}</td><td class="c-s">${s2}</td><td class="c-t">${s1+s2+scoring.h1}</td><td class="c-r">${getSym(f.p3)}</td><td class="edit-cell" onclick="editCell(${i},'p3')">${f.p3}</td><td class="c-s">${s3}</td><td class="c-r">${getSym(f.p4)}</td><td class="edit-cell" onclick="editCell(${i},'p4')">${f.p4}</td><td class="c-s">${s4}</td><td class="c-t2">${s3+s4+scoring.h2}</td></tr>`;
                    }).reverse().join('')}</tbody></table></div>`;
                <div class="bg-black/40 p-4 grid grid-cols-2 gap-4 border-t border-zinc-800">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[10px] font-bold uppercase"><span class="text-zinc-500">${getFirst(players[0].n)}</span> <span>${players[0].r}R</span></div>
                        ${!isSingles ? `<div class="flex justify-between text-[10px] font-bold uppercase"><span class="text-zinc-500">${getFirst(players[1].n)}</span> <span>${players[1].r}R</span></div>` : ''}
                    </div>
                    <div class="space-y-1 border-l border-zinc-800 pl-4">
                        <div class="flex justify-between text-[10px] font-bold uppercase"><span class="text-zinc-500">${getFirst(players[2].n)}</span> <span>${players[2].r}R</span></div>
                        ${!isSingles ? `<div class="flex justify-between text-[10px] font-bold uppercase"><span class="text-zinc-500">${getFirst(players[3].n)}</span> <span>${players[3].r}R</span></div>` : ''}
                    </div>
                </div>
            </div>`;
        }

        window.showSummary = (id) => {
            const h = state.bracketHistory[id]; const mod = document.getElementById('modal'); mod.style.display = 'block';
            const calc = (k) => ({ pts: h.frames.reduce((a,b)=>a+(b[k]||0),0), rng: h.frames.reduce((a,b)=>a+getR(b[k]),0) });
            const s1=calc('p1'), s2=calc('p2'), s3=calc('p3'), s4=calc('p4');
            mod.innerHTML = `<div class="p-8 text-center"><h2 class="text-2xl font-black text-sky-400 uppercase mb-8">Summary</h2>
                <div class="flex justify-between text-xl font-black border-zinc-800 border-b pb-4 mb-8"><span>${h.t1.name}: ${h.s1}</span><span>${h.t2.name}: ${h.s2}</span></div>
                <div class="space-y-3 mb-10 text-left">${[[h.p1n,s1],[h.p2n,s2],[h.p3n,s3],[h.p4n,s4]].map(x=>`<div class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 flex justify-between text-[11px]"><b>${x[0]}</b><span>Pts: ${x[1].pts} | Ringers: ${x[1].rng}</span></div>`).join('')}</div>
                <button onclick="document.getElementById('modal').style.display='none'" class="w-full bg-zinc-800 text-white p-6 rounded-2xl font-black uppercase text-xs">Close</button></div>`;
        }
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
